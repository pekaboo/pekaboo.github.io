<!DOCTYPE html>


<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="一键创作深度好文！" />
<title>营销号文案生成器</title>
<link rel="shortcut icon" href="images/icon_yxh.ico" />
<link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/MobiusBeta/assets/images/apple-touch-icon-yxh.png">

<body>
<div class="bodyBox">
<div class="titleBox">
营销号文案生成器
<div class="subTitle">by Mobius</div>
</div>
<div class="inputBox">
<input type="text" id="inputMain" placeholder="在此键入你的营销主题">
<div id="inputSubTitle"><i class="iconfont" id="iconArrow">&#xe69b;</i><span id="inputSubTitleText">在此键入你的营销主题</span></div>
</div>
<div id="resultBox">
<div id="resultBoxContent">
<div class="resultBoxPlaceholder">这里空空如也<br>快来做一个营销号填满它吧</div>
</div>
<div id="previewBlock">
<div id="btnViewFull">点击展开全文</div>
<div class="relatedNews">相关阅读</div>
<div class="newsItem" onclick="window.open('https://a.maorx.cn');">
<div class="newsCover" id="newsCover1"></div>
<div class="newsTitle">听说好看的人都用了这款浏览器主页</div>
<div class="newsOrigin">挨踢之家</div>
</div>
<div class="newsItem" onclick="window.open('https://airportal.cn/');">
<div class="newsCover" id="newsCover2"></div>
<div class="newsTitle">月球震惊，火星害怕！让外星人陷入恐慌的竟是这个中国网站</div>
<div class="newsOrigin">BBTV</div>
</div>
</div>
<div id="previewConfirmCover">
<div id="previewConfirmBox">
<div class="previewConfirmTitle">提示</div>
<div class="previewConfirmTip">前往百毒App查看全文，体验更佳</div>
<div class="previewConfirmBtn" id="previewConfirmBtnCancel">取消</div>
<div class="previewConfirmBtn" id="previewConfirmBtnOk">确定</div>
</div>
</div>
</div>
<div id="resultBtnBox">
<div class="resultBtn" id="btnPreview" title="预览营销号效果"><i class="iconfont iconResultBtn">&#xe722;</i>预览</div>
<div class="resultBtn" id="btnCopy" title="复制全文"><i class="iconfont iconResultBtn">&#xe6d2;</i>复制</div>
<div class="resultBtn" id="btnCopyWithoutTitle" title="复制不含标题的正文"><i class="iconfont iconResultBtn">&#xe6d2;</i>复制正文</div>
<span id="copyTip">已复制</span>
</div>
<footer>

</footer>
