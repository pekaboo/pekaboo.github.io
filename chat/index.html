        #bigBox {
            margin: 0 auto;
            margin-left: 20px;
            margin-right: 20px;
            /* login框剧中 */
            margin-top: 200px;
            /* login框与顶部的距离 */
            padding: 20px 50px;
            /* login框内部的距离(内部与输入框和按钮的距离) */
            background-color: #00000090;
            /* login框背景颜色和透明度 */
            /* width: 400px;
            height: 300px; */
            border-radius: 10px;
            /* 圆角边 */
            text-align: center;
            /* 框内所有内容剧中 */
        }
        
        #bigBox h1 {
            color: white;
            /* LOGIN字体颜色 */
        }
        
        #bigBox .inputBox {
            margin-top: 50px;
            /* 输入框顶部与LOGIN标题的间距 */
        }
        
        #bigBox .inputBox .inputText {
            margin-top: 20px;
            /* 输入框之间的距离 */
        }
        
        #bigBox .inputBox .inputText span {
            color: white;
            /* icon颜色 */
        }
        
        #bigBox .inputBox .inputText input {
            border: 0;
            /* 删除输入框边框 */
            padding: 10px 10px;
            /* 输入框内的间距 */
            border-bottom: 1px solid white;
            /* 输入框白色下划线 */
            background-color: #00000000;
            /* 输入框透明 */
            color: white;
            /* 输入字体的颜色 */
        }
        
        #bigBox .loginButton {
            margin-top: 30px;
            /* 按钮顶部与输入框的距离 */
            width: 150px;
            height: 25px;
            color: white;
            /* 按钮字体颜色 */
            border: 0;
            /* 删除按钮边框 */
            border-radius: 20px;
            /* 按钮圆角边 */
            background-image: linear-gradient(to right, #b8cbb8 0%, #b8cbb8 0%, #b465da 0%, #cf6cc9 33%, #ee609c 66%, #ee609c 100%);
            /* 按钮颜色 */
        }
        
        .hide {
            display: none;
        }
        /* toast */
        
        .toast_box {
            width: 100%;
            position: absolute;
            bottom: 50px;
            justify-content: center;
            display: none;
        }
        
        .toast_box p {
            box-sizing: border-box;
            padding: 10px 20px;
            max-width: 72%;
            width: max-content;
            background: #000;
            color: #FFF;
            font-size: 16px;
            text-align: center;
            border-radius: 6px;
            opacity: 0.8;
        }

<body>
    <div class="toast_box">
        <p id="toast"></p>
    </div>

    <div id="bigBox">
        <h1 id="title">登录</h1>
        <div class="inputBox">
            <div class="inputText hide" id="nickname">
                <span class="iconfont icon-nickname"></span>
                <input id="name" type="text" placeholder="昵称" />
            </div>

            <div class="inputText">
                <span class="iconfont icon-nickname"></span>
                <input id="username" type="text" placeholder="用户" />
            </div>
            <div class="inputText">
                <span class="iconfont icon-visible"></span>
                <input id="password" type="password" placeholder="密码" />
            </div>


        </div>
        <input id='clickBtn' class="loginButton" type="button" value="登录"></span>
        <label id='switchBtn' style="color: #f7f7f7;" class="" type="button" value="">注册</span>
        </input>
        </input>
    </div>
    <script>
        (function() {
            function getQueryVariable(variable) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] == variable) {
                    return pair[1];
                }
            }
            return ('');
        } 
        function toast(text, time=3000) {
            var toast = document.getElementById('toast');
            var toast_box = document.getElementsByClassName('toast_box')[0];
            toast.innerHTML = text;
            toast_box.style.display = 'flex';
            setTimeout(() => {
                toast_box.style.display = 'none';
            }, time)
        }
        function $$(selector) {
                var parent = arguments.length > 1 && arguments[1] !== undefined ? arguments[1] : document;
                return Array.prototype.slice.call(parent.querySelectorAll(selector), 0);
            };
 

            var isLoginPanel = true;
            AV.init({
                    appId: '2GpWXVb7zQozBVtVer4GRPtY-gzGzoHsz',
                    appKey: 'KE31O2EsHkK02HwJO5nyPfGD',
                    serverURLs: 'https://2gpwxvb7.lc-cn-n1-shared.com'
                });

          
            var usernameArea = $$('#username')[0];
            var passwordArea = $$("#password")[0];
            var nickname = $$("#nickname")[0];
            var nameArea = $$("#name")[0];

            var clickBtn = $$("#clickBtn")[0];
            var switchBtn = $$('#switchBtn')[0];
            var title = $$('#title')[0];

            // switchBtn = document.getElementById("switchBtn") 
            clickBtn.onclick = function() { 
                if (isLoginPanel) {
                    // console.log(usernameArea.value);
                    // console.log(passwordArea.value);  
                    //  登录
                    const query = new AV.Query('user');
                    query.equalTo('username', usernameArea.value);
                    query.equalTo('password', passwordArea.value);

                    query.find().then((students) => { 
                       if(students.length>0){
                           localStorage.setItem("login",true); 
                           localStorage.setItem("loginInfo",JSON.stringify(students[0]));  
                           
                           console.log('===');
                           console.log(getQueryVariable("callback"));
                           let callback = unescape(getQueryVariable("callback"));
                           console.log(callback);
                           if(callback){ 
                            location.href = callback;
                           }else{
                            location.href = "./home.html";
                           }  
                       }else{
                        toast("用户名或者密码有误")
                           return;
                       }
                    });
                
                    // 每次 进入需要判断
                } else {  
                    const query = new AV.Query('user');
                    query.equalTo('username', usernameArea.value);
                    query.find().then((students) => { 
                        console.log(students);
                       if(students.length>0 ){
                        toast("用户名已注册,请更换")
                        return;
                       }else{ 
                        console.log('============');
                        const User = AV.Object.extend('user');
                        const todo = new User();
                        todo.set('nickname',nameArea.value);
                        todo.set('username', usernameArea.value);
                        todo.set('password', passwordArea.value); 
                        // todo.set('ip', findMyIP()),
                        // todo.set('footprint', getUUID("AJUNCHAT"));
                        // todo.set('client', getOS() + '  ' + Browse() + '  ' + ScreenWidth() + '  ' + ScreenHeight());
                        // 将对象保存到云端 
                        todo.save().then((todo) => {
                            // 成功保存之后，执行其他逻辑
                            // console.log(todo);
                            // console.log(`保存成功。objectId：${todo.id}`);
                            // let row = todo._serverData; 
                            toast('注册成功'); 
                            location.reload();
                        }, (error) => {
                            console.log("Error getting document:", error);
                            toast('注册失败');
                        });
                       }
                    });
                }
            }
            switchBtn.onclick = function() {
                isLoginPanel = !isLoginPanel;
                if (isLoginPanel) {
                    clickBtn.value = "登录";
                    title.innerText = "登录";
                    switchBtn.innerText = "注册";
                    nickname.classList.add("hide");  
                    // nickname.style.display =  'none';
                } else {
                    clickBtn.value = "注册";
                    title.innerText = "注册";
                    switchBtn.innerText = "登录";
                    nickname.classList.remove("hide");
                    // nickname.style.display =  "block";
                }
                nameArea.value = '';
                usernameArea.value = '';
                passwordArea.value = '';
            }
        })();
    </script>
