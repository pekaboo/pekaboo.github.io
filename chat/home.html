    <script>
        String.prototype.replaceAll = function(o, n) {
            return this.replace(new RegExp(o, 'g'), n);
        };

        //利用原生Js获取操作系统版本
        function getOS() {
            var sUserAgent = navigator.userAgent;
            var isWin = (navigator.platform == "Win32") || (navigator.platform == "Windows");
            var isMac = (navigator.platform == "Mac68K") || (navigator.platform == "MacPPC") || (navigator.platform ==
                "Macintosh") || (navigator.platform == "MacIntel");
            if (isMac) return "Mac";
            var isUnix = (navigator.platform == "X11") && !isWin && !isMac;
            if (isUnix) return "Unix";
            var isLinux = (String(navigator.platform).indexOf("Linux") > -1);
            if (isLinux) return "Linux";
            if (isWin) {
                var isWin2K = sUserAgent.indexOf("Windows NT 5.0") > -1 || sUserAgent.indexOf("Windows 2000") > -1;
                if (isWin2K) return "Win2000";
                var isWinXP = sUserAgent.indexOf("Windows NT 5.1") > -1 || sUserAgent.indexOf("Windows XP") > -1;
                if (isWinXP) return "WinXP";
                var isWin2003 = sUserAgent.indexOf("Windows NT 5.2") > -1 || sUserAgent.indexOf("Windows 2003") > -1;
                if (isWin2003) return "Win2003";
                var isWinVista = sUserAgent.indexOf("Windows NT 6.0") > -1 || sUserAgent.indexOf("Windows Vista") > -1;
                if (isWinVista) return "WinVista";
                var isWin7 = sUserAgent.indexOf("Windows NT 6.1") > -1 || sUserAgent.indexOf("Windows 7") > -1;
                if (isWin7) return "Win7";
                var isWin10 = sUserAgent.indexOf("Windows NT 10") > -1 || sUserAgent.indexOf("Windows 10") > -1;
                if (isWin10) return "Win10";
            }
            return "other";
        }


        //document.write("您的操作系统是："+getOS());
        //console.log("您的操作系统是："+getOS())

        /****获得客户端ID****/
        function ClientID(name) {
            var cookies = document.cookie.split(";");
            var value = "";
            for (var i = 0; i < cookies.length; i++) {
                var temp = cookies[i].split("=");
                var tempValue = temp[0].replace(/(^\s*)|(\s*$)/g, "");
                if (tempValue == name) {
                    value = unescape(temp[1]);
                    break;
                }
            }
            return value;
        }

        /**获得屏幕宽度**/
        function ScreenWidth() {
            return window.screen.width;
        };
        /***获得屏幕高度**/
        function ScreenHeight() {
            return window.screen.height;
        };
        /**获得浏览器***/
        function Browse() {
            var browser = {};
            var userAgent = navigator.userAgent.toLowerCase();
            var s;
            (s = userAgent.match(/msie ([\d.]+)/)) ? browser.ie = s[1]: (s = userAgent.match(/firefox\/([\d.]+)/)) ?
                browser.firefox = s[1] : (s = userAgent.match(/chrome\/([\d.]+)/)) ? browser.chrome = s[1] : (s =
                    userAgent.match(/opera.([\d.]+)/)) ? browser.opera = s[1] : (s = userAgent.match(
                    /version\/([\d.]+).*safari/)) ? browser.safari = s[1] : 0;
            var version = "";
            if (browser.ie) {
                version = 'IE ' + browser.ie;
            } else {
                if (browser.firefox) {
                    version = 'firefox ' + browser.firefox;
                } else {
                    if (browser.chrome) {
                        version = 'chrome ' + browser.chrome;
                    } else {
                        if (browser.opera) {
                            version = 'opera ' + browser.opera;
                        } else {
                            if (browser.safari) {
                                version = 'safari ' + browser.safari;
                            } else {
                                version = '未知浏览器';
                            }
                        }
                    }
                }
            }
            return version;
        }

        function getQueryVariable(variable) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] == variable) {
                    return pair[1];
                }
            }
            return ('');
        }


        function findMyIP(only = false) {
            if (window.XMLHttpRequest) xmlhttp = new XMLHttpRequest();
            else xmlhttp = new ActiveXObject("Microsoft.XMLHTTP");

            xmlhttp.open("GET", "http://api.hostip.info/get_html.php", false);
            xmlhttp.send();

            hostipInfo = xmlhttp.responseText.split("\n");

            var myIp = ''
            var myCity = ''
            var myCountry = ''
            for (i = 0; hostipInfo.length >= i; i++) {
                if (hostipInfo[i]) {
                    ipAddress = hostipInfo[i].split(":");
                    if (ipAddress[0] == "IP") myIp = ipAddress[1];
                    if (ipAddress[0] == "Country") myCity = ipAddress[1];
                    if (ipAddress[0] == "City") myCountry = ipAddress[1];
                }
            }
            if (only) {
                return myIp
            } else {
                return {
                    'ip': myIp,
                    'city': myCity,
                    'country': myCountry,
                };
            }

        }


        // 浏览器指纹 begin

        function bin2hex(s) {
            var i, l, o = '',
                n;

            s += '';

            for (i = 0, l = s.length; i < l; i++) {
                n = s.charCodeAt(i)
                    .toString(16);
                o += n.length < 2 ? '0' + n : n;
            }

            return o;
        }

        function getUUID(domain) {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext("2d");
            var txt = domain;
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.textBaseline = "tencent";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125, 1, 62, 20);
            ctx.fillStyle = "#069";
            ctx.fillText(txt, 2, 15);
            ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
            ctx.fillText(txt, 4, 17);

            var b64 = canvas.toDataURL().replace("data:image/png;base64,", "");
            var bin = atob(b64);
            var crc = bin2hex(bin.slice(-16, -12));
            return crc;
        }

        // 浏览器指纹 end

        function timeFormat(timestamp) {
            var date; //时间戳为10位需*1000，时间戳为13位的话不需乘1000
            console.log(timestamp.toString().length);
            if (timestamp.toString().length == 10) {
                date = new Date(parseInt(timestamp) * 1000);
            } else if (timestamp.toString().length == 13) {
                date = new Date(parseInt(timestamp.toString()));
            }

            var year = date.getFullYear(),
                month = ("0" + (date.getMonth() + 1)).slice(-2),
                sdate = ("0" + date.getDate()).slice(-2),
                hour = ("0" + date.getHours()).slice(-2),
                minute = ("0" + date.getMinutes()).slice(-2),
                second = ("0" + date.getSeconds()).slice(-2);
            // 拼接
            var result = year + "-" + month + "-" + sdate + " " + hour + ":" + minute + ":" + second;
            // 返回
            return result;
        }

        function dateFormat(time = +new Date()) {
            console.log(time)
            var date = new Date(time + 8 * 3600 * 1000); // 增加8小时
            return date.toJSON().substr(0, 19).replace('T', ' ');
        }

        function runToTop() {
            var currentPosition, timer;
            var speed = 10;
            currentPosition = document.documentElement.scrollTop || document.body.scrollTop;
            currentPosition -= speed; //speed变量
            if (currentPosition > 0) {
                window.scrollTo(0, currentPosition);
            } else {
                window.scrollTo(0, 0);
                clearInterval(timer);
            }
            console.log(new Date());
        }

        function randomString(len) {
            len = len || 32;
            var $chars = 'ABCDEFGHJKMNPQRSTWXYZabcdefhijkmnprstwxyz2345678'; /****默认去掉了容易混淆的字符oOLl,9gq,Vv,Uu,I1****/
            var maxPos = $chars.length;
            var pwd = '';
            for (i = 0; i < len; i++) {
                pwd += $chars.charAt(Math.floor(Math.random() * maxPos));
            }
            1
            return pwd;
            1
        }
    </script>
